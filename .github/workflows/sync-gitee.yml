name: Sync to Gitee

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to Gitee
        uses: wearerequired/git-mirror-action@v1
        with:
          source-repo: ${{ github.event.repository.clone_url }}
          destination-repo: ${{ secrets.GITEE_REPO_URL }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_SSH_KEY }}

      - name: Success
        run: echo "✅ Synced to Gitee successfully!"